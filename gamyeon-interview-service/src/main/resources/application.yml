server:
  port: 8082

spring:
  application:
    name: gamyeon-interview-service

  datasource:
    url: jdbc:h2:mem:gamyeon-interview;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create
    database-platform: org.hibernate.dialect.H2Dialect
