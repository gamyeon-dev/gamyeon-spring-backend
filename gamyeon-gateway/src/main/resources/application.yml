server:
  port: 8080

spring:
  application:
    name: gamyeon-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**

        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/users/**

        - id: interview-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/interviews/**

        - id: report-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/reports/**

      httpclient:
        connect-timeout: 3000
        response-timeout: 10s

      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins:
              - "http://localhost:3000"
              - "https://gamyeon.com"
            allowed-methods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowed-headers:
              - Authorization
              - Content-Type
              - X-Requested-With
            allow-credentials: true
            max-age: 3600
