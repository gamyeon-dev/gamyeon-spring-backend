name: Spring Boot CI/CD

on:
  push:
    branches: [ "develop" ] # 배포 대상 브랜치

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Docker Hub 로그인
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 2. Docker 이미지 빌드 및 푸시
      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ vars.DOCKERHUB_USERNAME }}/gamyeon-spring:latest .
          docker push ${{ vars.DOCKERHUB_USERNAME }}/gamyeon-spring:latest

      # 3. EC2 접속 및 배포 실행
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/app

            docker network create gamyeon-net || true

            # GitHub Secrets 값으로 .env 파일 생성 (덮어쓰기)
            {
              echo "CONSUL_HOST=consul"
              echo "JWT_SECRET=${{ secrets.JWT_SECRET }}"
              echo "INTERNAL_API_KEY=${{ secrets.INTERNAL_API_KEY }}"
              echo "KAKAO_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }}"
              echo "KAKAO_CLIENT_SECRET=${{ secrets.KAKAO_CLIENT_SECRET }}"
              echo "KAKAO_REDIRECT_URI=${{ secrets.KAKAO_REDIRECT_URI }}"
              echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}"
              echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}"
              echo "GOOGLE_REDIRECT_URI=${{ secrets.GOOGLE_REDIRECT_URI }}"
              echo "SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }}"
              echo "SPRING_DATASOURCE_USERNAME=${{ secrets.SPRING_DATASOURCE_USERNAME }}"
              echo "SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }}"
              echo "SPRING_JPA_HIBERNATE_DDL_AUTO=${{ secrets.SPRING_JPA_HIBERNATE_DDL_AUTO }}"
              echo "S3_BUCKET=${{ secrets.S3_BUCKET }}"
              echo "S3_REGION=${{ secrets.S3_REGION }}"
              echo "S3_PRESIGNED_DURATION_SECONDS=${{ secrets.S3_PRESIGNED_DURATION_SECONDS }}"
              echo "S3_ACCESS_KEY=${{ secrets.S3_ACCESS_KEY }}"
              echo "S3_SECRET_KEY=${{ secrets.S3_SECRET_KEY }}"
            } > .env

            # 최신 이미지 풀 및 컨테이너 재시작
            docker pull ${{ vars.DOCKERHUB_USERNAME }}/gamyeon-spring:latest
            docker-compose up -d --no-deps spring-server