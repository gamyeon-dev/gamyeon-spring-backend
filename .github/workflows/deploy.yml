name: Spring Boot CI/CD

on:
  push:
    branches: [ "develop", "feat/*", "fix/*", "refactor/*", "chore/*", "docs/*", "test/*" ]

jobs:
  # 1. 공통 검증 단계 (CI)
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Lint 검사 및 코드 스타일 강제 (오류 발생 시 빌드 실패)
      - name: Check Code Style
        run: ./gradlew spotlessCheck

      # 빌드 및 테스트
      - name: Build and Test
        run: ./gradlew clean build

  # 2. 배포 단계 (CD) - develop 브랜치일 때만 실행
  deploy:
    needs: test-and-build # CI가 성공해야만 실행
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Docker Hub 로그인
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 2. Docker 이미지 빌드 및 푸시
      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/gamyeon-spring:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/gamyeon-spring:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/app
            
            # 컨테이너 중지 및 기존 이미지 삭제 (이미지 이름이 중복되어 충돌나는 것 방지)
            docker-compose down spring-server || true
            
            # 'latest' 이미지가 존재하면 삭제 (이미지를 pull하기 전 공간 확보)
            docker rmi ${{ secrets.DOCKERHUB_USERNAME }}/gamyeon-spring:latest || true
            
            # 새로 pull
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/gamyeon-spring:latest
            
            # 최신 이미지 풀 및 컨테이너 재시작
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/gamyeon-spring:latest
            docker-compose up -d --no-deps spring-server
            
            # 불필요한 이미지 찌꺼기 청소 (디스크 용량 확보)
            docker image prune -f