name: Spring Boot CI/CD

on:
  push:
    branches: [ "chore/cd" ] # 배포 대상 브랜치

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Docker Hub 로그인
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 2. Docker 이미지 빌드 및 푸시
      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ vars.DOCKERHUB_USERNAME }}/gamyeon-spring:latest .
          docker push ${{ vars.DOCKERHUB_USERNAME }}/gamyeon-spring:latest

      # 3. EC2 접속 및 배포 실행
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/app
            
            # [수정] 1. GitHub Secrets의 값으로 .env 파일을 강제 생성 (덮어쓰기)
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
            echo "KAKAO_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }}" >> .env
            echo "KAKAO_CLIENT_SECRET=${{ secrets.KAKAO_CLIENT_SECRET }}" >> .env
            echo "KAKAO_REDIRECT_URI=${{ secrets.KAKAO_REDIRECT_URI }}" >> .env
            echo "GOOGLE_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }}" >> .env
            echo "GOOGLE_CLIENT_SECRET=${{ secrets.KAKAO_CLIENT_ID }}" >> .env
            echo "GOOGLE_REDIRECT_URI=${{ secrets.KAKAO_CLIENT_ID }}" >> .env
            
            # [수정] 2. 최신 이미지 풀
            docker pull ${{ vars.DOCKERHUB_USERNAME }}/gamyeon-spring:latest
            
            # [수정] 3. 기존 컨테이너 중지 및 삭제
            docker stop gamyeon-spring || true
            docker rm gamyeon-spring || true
            
            # [수정] 4. 실행 (이미 .env 파일이 생성되었으므로 --env-file .env 정상 작동)
            docker run -d --name gamyeon-spring -p 8080:8080 \
              --network app_default \
              -e CONSUL_HOST=consul \
              --env-file .env \
              ${{ vars.DOCKERHUB_USERNAME }}/gamyeon-spring:latest