name: Spring Boot CI/CD

on:
  push:
    branches: [ "develop", "feat/*", "fix/*", "refactor/*", "chore/*", "docs/*", "test/*" ]

jobs:
  # 1. 공통 검증 단계 (CI)
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Lint 검사 및 코드 스타일 강제 (오류 발생 시 빌드 실패)
      - name: Check Code Style
        run: ./gradlew spotlessCheck

      # 빌드 및 테스트
      - name: Build and Test
        run: ./gradlew clean build

  # 2. 배포 단계 (CD) - develop 브랜치일 때만 실행
  deploy:
    needs: test-and-build # CI가 성공해야만 실행
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Docker Hub 로그인
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 2. Docker 이미지 빌드 및 푸시
      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/gamyeon-spring:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/gamyeon-spring:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/app
            
            # Consul KV로 관리할 예정이므로 .env 생성 로직은 추후 제거
            {
              echo "CONSUL_HOST=consul"
              echo "JWT_SECRET=${{ secrets.JWT_SECRET }}"
              echo "INTERNAL_API_KEY=${{ secrets.INTERNAL_API_KEY }}"
              echo "KAKAO_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }}"
              echo "KAKAO_CLIENT_SECRET=${{ secrets.KAKAO_CLIENT_SECRET }}"
              echo "KAKAO_REDIRECT_URI=${{ secrets.KAKAO_REDIRECT_URI }}"
              echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}"
              echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}"
              echo "GOOGLE_REDIRECT_URI=${{ secrets.GOOGLE_REDIRECT_URI }}"
              echo "SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }}"
              echo "SPRING_DATASOURCE_USERNAME=${{ secrets.SPRING_DATASOURCE_USERNAME }}"
              echo "SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }}"
              echo "SPRING_JPA_HIBERNATE_DDL_AUTO=${{ secrets.SPRING_JPA_HIBERNATE_DDL_AUTO }}"
              echo "S3_BUCKET=${{ secrets.S3_BUCKET }}"
              echo "S3_REGION=${{ secrets.S3_REGION }}"
              echo "S3_PRESIGNED_DURATION_SECONDS=${{ secrets.S3_PRESIGNED_DURATION_SECONDS }}"
              echo "S3_ACCESS_KEY=${{ secrets.S3_ACCESS_KEY }}"
              echo "S3_SECRET_KEY=${{ secrets.S3_SECRET_KEY }}"
            } > .env
            
            # 최신 이미지 풀 및 컨테이너 재시작
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/gamyeon-spring:latest
            docker-compose up -d --no-deps spring-server