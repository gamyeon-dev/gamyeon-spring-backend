spring:
  application:
    name: gamyeon-backend
  config:
    import: "optional:consul:"
  cloud:
    compatibility-verifier:
      enabled: false
    consul:
      host: ${CONSUL_HOST:localhost}
      port: ${CONSUL_PORT:8500}
      config:
        enabled: true
      discovery:
        enabled: true
        service-name: GAMYEON-BACKEND
        instance-id: GAMYEON-BACKEND:${server.port}
        fail-fast: false
  datasource:
    url: ${spring.datasource.url}
    driver-class-name: org.postgresql.Driver
    username: ${spring.datasource.username}
    password: ${spring.datasource.password}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: ${spring.jpa.hibernate.ddl-auto:none}
    show-sql: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

jwt:
  secret: ${jwt.secret}
  access-token-expiry: 3600000
  refresh-token-expiry: 604800000

internal:
  api-key: ${internal.api-key}

oauth:
  google:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
    redirect-uri: ${GOOGLE_REDIRECT_URI}
  kakao:
    client-id: ${KAKAO_CLIENT_ID}
    client-secret: ${KAKAO_CLIENT_SECRET}
    redirect-uri: ${KAKAO_REDIRECT_URI}

storage:
  s3:
    bucket: ${storage.s3.bucket}
    region: ${storage.s3.region}
    presigned-duration-seconds: ${storage.s3.presigned-duration-seconds:900}
    access-key: ${storage.s3.access-key:}
    secret-key: ${storage.s3.secret-key:}
