spring:
  application:
    name: gamyeon-backend
  config:
    import: "optional:consul:"
  cloud:
    compatibility-verifier:
      enabled: false
    consul:
      host: ${CONSUL_HOST:localhost}
      port: ${CONSUL_PORT:8500}
      config:
        enabled: true
        format: YAML
        data-key: data
      discovery:
        enabled: true
        service-name: gamyeon-backend
        instance-id: GAMYEON-SPRING-SERVER:${random.value}
        fail-fast: false
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    properties:
      hibernate:
        format_sql: true

jwt:
  access-token-expiry: 3600000
  refresh-token-expiry: 604800000
