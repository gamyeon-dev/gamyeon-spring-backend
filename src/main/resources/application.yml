spring:
  profiles:
    active: prod
  application:
    name: gamyeon-backend
  cloud:
    compatibility-verifier:
      enabled: false
    consul:
      host: ${CONSUL_HOST:localhost}
      port: ${CONSUL_PORT:8500}
      config:
        enabled: false   # 시크릿은 GitHub Secrets → CI/CD 환경변수로 관리
      discovery:
        enabled: true
        instance-id: ${spring.application.name}:${server.port}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO}
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  cloud:
    consul:
      host: ${CONSUL_HOST:localhost}
      port: 8500
      discovery:
        register: true
        instance-id: ${spring.application.name}:${random.value}
  config:
    import: "optional:consul:"

management:
  endpoints:
    web:
      exposure:
        include: health,info  # health와 info 엔드포인트를 노출
  endpoint:
    health:
      show-details: always   # 상태 체크 시 자세한 내용을 보여줌

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}
  access-token-expiry: 3600000
  refresh-token-expiry: 604800000

internal:
  api-key: ${INTERNAL_API_KEY}

oauth:
  google:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
    redirect-uri: ${GOOGLE_REDIRECT_URI}
  kakao:
    client-id: ${KAKAO_CLIENT_ID}
    client-secret: ${KAKAO_CLIENT_SECRET}
    redirect-uri: ${KAKAO_REDIRECT_URI}

storage:
  s3:
    bucket: ${S3_BUCKET}
    region: ${S3_REGION}
    presigned-duration-seconds: ${S3_PRESIGNED_DURATION_SECONDS:900}
    access-key: ${S3_ACCESS_KEY:}
    secret-key: ${S3_SECRET_KEY:}
