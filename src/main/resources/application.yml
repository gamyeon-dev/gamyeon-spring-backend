spring:
  application:
    name: gamyeon-backend
  config:
    import: "optional:consul:"
  cloud:
    compatibility-verifier:
      enabled: false
    consul:
      host: ${CONSUL_HOST:localhost}
      port: ${CONSUL_PORT:8500}
      config:
        enabled: true
      discovery:
        enabled: true
        service-name: GAMYEON-BACKEND
        instance-id: GAMYEON-BACKEND:${server.port}
        fail-fast: false
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: ${spring.jpa.hibernate.ddl-auto:none}
    show-sql: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

jwt:
  access-token-expiry: 3600000
  refresh-token-expiry: 604800000
