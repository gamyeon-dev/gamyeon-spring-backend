spring:
  application:
    name: gamyeon-backend
  config:
    import: "optional:consul:"
  cloud:
    compatibility-verifier:
      enabled: false
    consul:
      host: ${CONSUL_HOST:localhost}
      port: ${CONSUL_PORT:8500}
      config:
        enabled: true
        format: YAML
        data-key: data
      discovery:
        enabled: true
        service-name: gamyeon-backend
        instance-id: gamyeon-spring-server-${random.value}
        fail-fast: false
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    # 4. 추가된 콜백 URL 프로퍼티 (에러 해결 핵심)
  server:
    callback-base-url: http://localhost:8080

jwt:
  access-token-expiry: 3600000
  refresh-token-expiry: 604800000

ai:
  server:
    url: "http://agent-server:8000"

aws:
  s3:
    base-url: "https://your-bucket-name.s3.ap-northeast-2.amazonaws.com"