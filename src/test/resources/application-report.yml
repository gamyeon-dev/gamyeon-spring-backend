# src/test/resources/application-report.yml
spring:
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  cloud:
    consul:
      enabled: false
      config:
        enabled: false
      discovery:
        enabled: false

jwt:
  secret: test-secret-key-minimum-32-characters!!
  access-token-expiry: 3600000
  refresh-token-expiry: 604800000

internal:
  api-key: test-internal-api-key

oauth:
  google:
    client-id: test-google-client-id
    client-secret: test-google-client-secret
    redirect-uri: http://localhost:8080/login/oauth2/code/google
  kakao:
    client-id: test-kakao-client-id
    client-secret: test-kakao-client-secret
    redirect-uri: http://localhost:8080/login/oauth2/code/kakao


storage:
  s3:
    bucket: test-bucket
    region: ap-northeast-2
    presigned-duration-seconds: 900
    #  중요: 빈 값으로 두지 말고 아무 문자열이나 채워넣어야 SDK 에러가 안 납니다.
    access-key: dummy-access-key
    secret-key: dummy-secret-key

# 리포트 테스트에 필요한 추가 설정이 있다면 여기에 작성