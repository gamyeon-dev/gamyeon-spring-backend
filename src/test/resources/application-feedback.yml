# src/test/resources/application-feedback.yml
spring:
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  cloud:
    consul:
      enabled: false
      config:
        enabled: false
      discovery:
        enabled: false

jwt:
  secret: test-secret-key-minimum-32-characters!!
  access-token-expiry: 3600000
  refresh-token-expiry: 604800000

internal:
  api-key: test-internal-api-key

oauth:
  google:
    client-id: test-google-client-id
    client-secret: test-google-client-secret
    redirect-uri: http://localhost:8080/login/oauth2/code/google
  kakao:
    client-id: test-kakao-client-id
    client-secret: test-kakao-client-secret
    redirect-uri: http://localhost:8080/login/oauth2/code/kakao

storage:
  s3:
    bucket:
    region: ap-northeast-2
    presigned-duration-seconds: 900
    access-key:
    secret-key:
