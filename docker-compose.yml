services:
  spring-server:
    image: zzang6535/gamyeon-spring:latest
    container_name: SPRING-SERVER
    ports:
      - "8080:8080"
    environment:
      - CONSUL_HOST=consul
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_CLOUD_CONSUL_CONFIG_ENABLED=true
      - SPRING_CLOUD_CONSUL_HOST=consul # 또는 실제 consul 내부 IP
      - SPRING_CLOUD_CONSUL_PORT=8500
      - S3_ACCESS_KEY=
      - S3_SECRET_KEY=
    networks:
      - gamyeon-net

networks:
  gamyeon-net:
    external: true
